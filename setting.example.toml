[llm]
base_url = "https://api.example.com/v1"
api_key = "YOUR_API_KEY"
model = "example-model"
timeout = 600
# 可选：透传给模型服务请求体的额外 JSON 参数。
# 当前流程需要完整 JSON 响应后再检查并保存译文，因此不支持 stream=true 或 stream_options。
# request_body_extra = '''
# {
#   "reasoning_effort": "high",
#   "thinking": {"type": "enabled"}
# }
# '''

[translation_context]
token_size = 1024
factor = 3.5
max_command_items = 5

[text_translation]
worker_count = 200
rpm = 200
retry_count = 3
retry_delay = 2
system_prompt_file = "prompts/text_translation_system.md"
# 注册游戏时必须显式使用 `add-game --source-language ja|en`；运行时会自动切换到对应提示词。
# 如果这里填写自定义提示词文件，语言档案不会覆盖该文件；CLI 的 --system-prompt 仍是最高优先级。

[event_command_text]
default_command_codes = [357]

[event_command_text.default_command_codes_by_engine]
mv = [356]
mz = [357]

[write_back]
# 仅在 CLI 显式传入 --confirm-font-overwrite 时使用；普通写回不会覆盖字体引用。
replacement_font_path = "fonts/NotoSansSC-Regular.ttf"

[text_rules]
strip_wrapping_punctuation_pairs = [["「", "」"]]
preserve_wrapping_punctuation_pairs = [["「", "」"], ["『", "』"]]
line_split_punctuations = [
  "，", "。", "、", "；", "：", "！", "？", "…", "～", "—", "♪", "♡",
  "）", "】", "」", "』", ",", ".", ";", ":", "!", "?",
]
long_text_line_width_limit = 26
line_width_count_pattern = "\\S"
# 源语言识别和源文残留规则会按游戏注册时的 source_language 自动套用。
source_residual_allowed_chars = ["っ", "ッ", "ー", "・", "。", "～", "…"]
source_residual_allowed_tail_chars = ["あ", "い", "う", "え", "お", "っ", "ッ", "ん", "ー", "よ", "ね", "な", "か"]
source_text_required_pattern = "[\\u3040-\\u309F\\u30A0-\\u30FF\\u3400-\\u4DBF\\u4E00-\\u9FFF\\uF900-\\uFAFF]+"
source_text_exclusion_profile = "none"
source_residual_segment_pattern = "[\\u3040-\\u309F\\u30A0-\\u30FF]+"
source_residual_terms_ignore_case = false
residual_escape_sequence_pattern = "\\\\[nrt]"
